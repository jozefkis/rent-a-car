<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button color="primary"></ion-menu-button>
    </ion-buttons>
    <ion-title style="letter-spacing: -0.5px;">Upravljanje rezervacijama</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  
  <div *ngIf="isLoading" class="ion-text-center" style="margin-top: 50px;">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p style="color: var(--ion-color-step-500); font-size: 0.9rem;">Osvežavanje baze...</p>
  </div>

  <div *ngIf="!isLoading" class="ion-padding">
    
    <div *ngFor="let r of rezervacije" 
         style="background: var(--ion-card-background, var(--ion-item-background, #fff)); 
                border-radius: 20px; 
                margin-bottom: 20px; 
                padding: 16px; 
                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
                position: relative;
                overflow: hidden;">
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div style="display: flex; align-items: center; gap: 6px;">
          <div [style.background]="r.status === 'active' ? '#2dd36f' : '#92949c'"
               style="width: 8px; height: 8px; border-radius: 50%;"></div>
          <span style="font-size: 0.7rem; font-weight: 700; color: var(--ion-color-step-600); letter-spacing: 0.5px; text-transform: uppercase;">
            {{ r.status === 'active' ? 'U toku' : 'Završeno' }}
          </span>
        </div>
        <span style="font-weight: 800; color: var(--ion-color-primary); font-size: 1.1rem;">
          {{ r.totalPrice }}€
        </span>
      </div>

      <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
        <div style="width: 65px; height: 65px; border-radius: 14px; overflow: hidden; background: var(--ion-color-step-100);">
          <img [src]="r.vehicleImage || 'assets/placeholder-car.png'" 
               style="width: 100%; height: 100%; object-fit: cover;" />
        </div>
        <div>
          <h2 style="margin: 0; font-weight: 700; font-size: 1.15rem; color: var(--ion-text-color);">{{ r.vehicleName }}</h2>
          <p style="margin: 4px 0 0; font-size: 0.85rem; color: var(--ion-color-step-500); display: flex; align-items: center; gap: 4px;">
            <ion-icon name="person-outline" style="font-size: 14px;"></ion-icon>
            ID: {{ r.userId }}
          </p>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; background: var(--ion-color-step-50); border-top: 1px solid var(--ion-color-step-150); padding-top: 15px; margin-top: 5px;">
        <div style="flex: 1;">
          <small style="display: block; font-size: 0.6rem; color: var(--ion-color-step-400); text-transform: uppercase; font-weight: 700;">Preuzimanje</small>
          <span style="font-weight: 600; color: var(--ion-text-color); font-size: 0.9rem;">{{ r.startDate | date:'dd. MMM yyyy' }}</span>
        </div>
        
        <div style="padding: 0 15px;">
          <ion-icon name="calendar-outline" style="color: var(--ion-color-step-300); font-size: 20px;"></ion-icon>
        </div>

        <div style="flex: 1; text-align: right;">
          <small style="display: block; font-size: 0.6rem; color: var(--ion-color-step-400); text-transform: uppercase; font-weight: 700;">Vraćanje</small>
          <span style="font-weight: 600; color: var(--ion-text-color); font-size: 0.9rem;">{{ r.endDate | date:'dd. MMM yyyy' }}</span>
        </div>
      </div>

      <div *ngIf="r.status === 'active'" style="margin-top: 15px;">
        <ion-button 
          (click)="zavrsiRezervaciju(r.id)" 
          expand="block" 
          fill="outline" 
          color="success" 
          style="--border-radius: 12px; font-weight: 700; --border-width: 2px; margin-top: 10px;">
          <ion-icon name="checkmark-done-outline" slot="start"></ion-icon>
          Završi
        </ion-button>
      </div>

    </div> <div *ngIf="rezervacije.length === 0" class="ion-text-center" style="margin-top: 50px; color: var(--ion-color-step-400);">
      <ion-icon name="document-text-outline" style="font-size: 4rem; opacity: 0.3;"></ion-icon>
      <p>Nema zabeleženih rezervacija.</p>
    </div>

  </div>
</ion-content>
