<div class="login-container">
  
  <div class="header-section ion-text-center">
    <h1 class="main-title">Dobrodošli</h1>
    <p class="subtitle">Prijavite se kako biste nastavili</p>
  </div>

  <!-- Korisničko ime -->
  <ion-item lines="none" class="auth-item auth-card">
    <ion-icon name="at-outline" slot="start" color="primary"></ion-icon>
    <ion-input 
      placeholder="Korisničko ime" 
      [(ngModel)]="username">
    </ion-input>
  </ion-item>

  <!-- Lozinka sa ugrađenim toggle-om -->
  <ion-item lines="none" class="auth-item auth-card">
    <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
    <ion-input 
      type="password"
      placeholder="Lozinka"
      [(ngModel)]="password">
      <ion-input-password-toggle slot="end"></ion-input-password-toggle>
    </ion-input>
  </ion-item>

  <div class="action-section">
    <ion-button expand="block" shape="round" class="main-btn" (click)="onLogin()">
      PRIJAVI SE
    </ion-button>
  </div>

  <div class="footer-section ion-text-center">
    <p>Nemate nalog? <span class="link" routerLink="/register">Registrujte se</span></p>
  </div>
</div>
