<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Prijava</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">

    <div class="header-section ion-text-center">
      <h1 class="main-title">Dobrodošli</h1>
      <p class="subtitle">Prijavite se kako biste nastavili</p>
    </div>

    <!-- Izmenjen deo sa floating label stilom -->
    <div class="auth-card">
      <ion-item lines="none" class="auth-item">
        <ion-icon name="at-outline" slot="start" color="primary"></ion-icon>
        <ion-input label="Korisničko ime" labelPlacement="floating" placeholder="Unesite korisničko ime"
          [(ngModel)]="username">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="auth-item">
        <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
        <ion-input label="Lozinka" labelPlacement="floating" type="password" placeholder="Unesite lozinku"
          [(ngModel)]="password">
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>
    </div>

    <div class="action-section">
      <ion-button expand="block" shape="round" class="main-btn" (click)="onLogin()">
        PRIJAVI SE
      </ion-button>
    </div>

    <div class="footer-section ion-text-center">
      <p>Nemate nalog? <span class="link" routerLink="/register">Registrujte se</span></p>
    </div>

  </div>
</ion-content>
